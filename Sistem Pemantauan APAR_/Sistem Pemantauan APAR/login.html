<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Sistem Monitoring APAR - PT KAI</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Background Pattern -->
    <div class="kai-pattern"></div>

    <div class="login-container">
        <div class="login-card">

            <!-- Logo & Brand -->
            <div class="logo-wrap">
                <img src="assets/img/logo kai.png" alt="PT KAI Logo">
                <div class="brand-title">Sistem Monitoring APAR</div>
                <div class="brand-sub">PT Kereta Api Indonesia (Persero)</div>
            </div>

            <h3>Masuk ke Sistem</h3>
            <p class="sub-text">Silakan masukkan kredensial akun Anda</p>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-id-card me-1"></i> NIPP / Username
                    </label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="form-control" placeholder="Masukkan NIPP atau Username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock me-1"></i> Kata Sandi
                    </label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Masukkan Kata Sandi" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Ingat Saya
                    </label>
                    <a href="forgot-password.html" class="forgot-password">
                        <i class="fas fa-question-circle"></i> Lupa Kata Sandi?
                    </a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-right-to-bracket"></i> Masuk</span>
                    <span class="btn-loading d-none">
                        <span class="spinner"></span> Memverifikasi...
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">atau</div>

            <!-- Register Link -->
            <p class="register-link">
                <span>Belum memiliki akun?</span>
                <a href="register.html">Daftar Sekarang</a>
            </p>

        </div>
    </div>

    <!-- KAI Custom Modal -->
    <div class="kai-modal-overlay" id="kaiModal">
        <div class="kai-modal-box">
            <div class="kai-modal-header">
                <div class="modal-icon" id="modalIcon">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <div class="modal-title" id="modalTitle">Perhatian</div>
            </div>
            <div class="kai-modal-body" id="modalBody">Pesan</div>
            <div class="kai-modal-footer">
                <button class="btn-modal btn-primary" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
    // ===========================
    // KAI CUSTOM MODAL
    // ===========================
    function showModal(icon, title, message) {
        const modal = document.getElementById('kaiModal');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        modalIcon.className = 'modal-icon icon-' + icon;
        modalIcon.innerHTML = icon === 'error' ? '<i class="fas fa-circle-exclamation"></i>' :
                              icon === 'success' ? '<i class="fas fa-circle-check"></i>' :
                              icon === 'warning' ? '<i class="fas fa-triangle-exclamation"></i>' :
                              '<i class="fas fa-circle-info"></i>';
        modalTitle.textContent = title;
        modalBody.textContent = message;
        modal.classList.add('show');
    }

    function closeModal() {
        document.getElementById('kaiModal').classList.remove('show');
    }

    document.getElementById('kaiModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
        if(e.key === 'Escape') closeModal();
    });

    // =========================
    // TOGGLE PASSWORD VISIBILITY
    // =========================
    function togglePassword() {
        const password = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if(password.type === 'password') {
            password.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            password.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // =========================
    // LOGIN HANDLER
    // =========================
    document.getElementById('loginForm').addEventListener('submit', loginUser);

    function loginUser(e) {
        e.preventDefault();

        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const btnLoading = loginBtn.querySelector('.btn-loading');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const rememberMe = document.getElementById('rememberMe').checked;

        // Validasi input
        if(!username || !password) {
            showModal('error', 'Data Belum Lengkap', 'NIPP/Username dan Kata Sandi harus diisi.');
            return;
        }

        // Tampilkan loading
        loginBtn.disabled = true;
        btnText.classList.add('d-none');
        btnLoading.classList.remove('d-none');

        setTimeout(function() {
            const users = JSON.parse(localStorage.getItem('users')) || [];

            const user = users.find(u =>
                (u.username && u.username.toLowerCase() === username.toLowerCase()) ||
                (u.nip && u.nip.toLowerCase() === username.toLowerCase())
            );

            if(!user) {
                showModal('error', 'Akun Tidak Ditemukan', 'NIPP/Username tidak terdaftar. Silakan hubungi administrator.');
                resetButton();
                return;
            }

            if(user.password !== password) {
                showModal('error', 'Kata Sandi Salah', 'Kata Sandi yang Anda masukkan salah. Silakan coba lagi.');
                resetButton();
                return;
            }

            // Proses login sukses
            localStorage.setItem('login', 'true');

            const userData = {
                id: user.id,
                nama: user.nama,
                nip: user.nip,
                username: user.username,
                email: user.email,
                area: user.area || user.daop,
                role: user.role || 'Petugas'
            };
            localStorage.setItem('user', JSON.stringify(userData));

            if(rememberMe) {
                localStorage.setItem('rememberMe', 'true');
                localStorage.setItem('savedUser', userData.nip || userData.username);
            } else {
                localStorage.removeItem('rememberMe');
                localStorage.removeItem('savedUser');
            }

            window.location.href = 'user/dashboard.html';
        }, 800);
    }

    function resetButton() {
        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const btnLoading = loginBtn.querySelector('.btn-loading');

        loginBtn.disabled = false;
        btnText.classList.remove('d-none');
        btnLoading.classList.add('d-none');
    }

    // =========================
    // REMEMBER ME - Auto Fill
    // =========================
    (function() {
        if(localStorage.getItem('rememberMe') === 'true') {
            const savedUser = localStorage.getItem('savedUser');
            if(savedUser) {
                document.getElementById('username').value = savedUser;
                document.getElementById('rememberMe').checked = true;
                document.getElementById('password').focus();
            }
        }
    })();
    </script>

</body>
